# Nginx Configuration optimized for Laravel
# docker/nginx-laravel.conf

worker_processes auto;
pid /run/nginx.pid;
events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Performance settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Buffers
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    client_max_body_size 50M;
    large_client_header_buffers 4 4k;
    
    # Timeouts
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        image/x-icon
        font/woff
        font/woff2;

    # FastCGI cache for PHP responses
    fastcgi_cache_path /tmp/nginx_cache levels=1:2 keys_zone=LARAVEL:200m inactive=60m use_temp_path=off;
    fastcgi_cache_key "$scheme$request_method$host$request_uri";

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/s;

    # Real IP configuration (Trust the Load Balancer)
    set_real_ip_from 172.16.0.0/12; # Docker default network range
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 127.0.0.1;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    server {
        listen 80;
        server_name _;
        root /var/www/html/public;
        index index.php;
        client_max_body_size 50M;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Static assets - aggressive caching (Vite adds hash to filenames)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
            access_log off;
            log_not_found off;
            gzip_static on;
        }

        # HTML files - cache with revalidation
        location ~* \.html$ {
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
            add_header Vary "Accept-Encoding";
            gzip_static on;
        }

        # API routes - rate limiting, no caching
        location ~ ^/(api|admin|auth|chat|socket|horizon) {
            limit_req zone=api burst=20 nodelay;
            try_files $uri $uri/ /index.php?$query_string;
            
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Login routes - stricter rate limiting
        location ~ ^/(login|register|password|auth) {
            limit_req zone=login burst=5 nodelay;
            try_files $uri $uri/ /index.php?$query_string;
        }

        # PHP processing with FastCGI cache
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_param HTTPS $https if_not_empty;

            # Connection timeouts (prevent 502 during PHP-FPM restarts)
            fastcgi_connect_timeout 10s;
            fastcgi_send_timeout 300s;
            fastcgi_read_timeout 300s;

            # FastCGI cache settings
            fastcgi_cache LARAVEL;
            fastcgi_cache_valid 200 10m;
            fastcgi_cache_valid 404 1m;
            fastcgi_cache_lock on;
            fastcgi_cache_lock_age 5s;
            fastcgi_cache_bypass $http_pragma $http_authorization;
            fastcgi_no_cache $http_pragma $http_authorization;
            fastcgi_cache_use_stale error timeout updating invalid_header http_500 http_503;
            fastcgi_cache_min_uses 1;

            # Intercept errors for custom error pages
            fastcgi_intercept_errors on;

            # Performance headers
            add_header X-FastCGI-Cache $upstream_cache_status;

            # Buffer settings
            fastcgi_buffer_size 128k;
            fastcgi_buffers 4 256k;
            fastcgi_busy_buffers_size 256k;
        }

        # Laravel routes - fallback to index.php
        location / {
            try_files $uri $uri/ /index.php?$query_string;
            
            # Cache HTML responses
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
            add_header Vary "Accept-Encoding";
        }

        # Custom error pages
        error_page 502 /502.html;
        location = /502.html {
            internal;
            default_type text/html;
            return 502 '<!DOCTYPE html><html><head><title>502</title><style>body{font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;background:#f5f5f5}div{text-align:center;padding:40px}h1{color:#e53e3e;font-size:48px}p{color:#666;font-size:18px}</style></head><body><div><h1>502</h1><p>Service is starting up, please retry in a few seconds...</p></div></body></html>';
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # OPcache status page (optional - restrict access in production)
        location /opcache-status {
            allow 127.0.0.1;
            deny all;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }

        # Deny access to sensitive files
        location ~ /\. {
            deny all;
        }
        
        location ~ \.(env|log|conf|md)$ {
            deny all;
        }
    }
}
