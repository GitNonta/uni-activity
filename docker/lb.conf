worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    
    # Map Upgrade header to Connection header for WebSockets
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Dynamic DNS resolution for Docker (re-resolve every 10s)
    resolver 127.0.0.11 valid=10s;

    # Upstream pool with keepalive to reduce connection churn
    upstream app {
        server app:80;
        keepalive 16;
    }

    upstream reverb {
        server app:8080;
        keepalive 16;
    }

    # Extract port from Host header or default to server port
    map $http_host $forwarded_port {
        ~:(\d+)$ $1;
        default $server_port;
    }

    # Real IP from Ngrok
    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Main Web Server (Port 80 -> mapped to 8000)
    server {
        listen 80;
        server_name _;

        location / {
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $forwarded_port;
            # Allow upstream keepalive/persistent connections
            proxy_set_header Connection "";
            proxy_pass http://app;
            
            # Resilience settings
            proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 10s;

            # Increase timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # Reverb (WebSocket) Proxy for same-port access (Ngrok friendly)
        location /app {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $forwarded_port;
            
            proxy_pass http://reverb;
            proxy_read_timeout 86400s;
        }

        # Health check
        location /health-lb {
            access_log off;
            return 200 "load-balancer-is-healthy\n";
        }
    }

    # WebSocket Server (Port 8080 -> mapped to 8080)
    server {
        listen 8080;
        server_name _;

        location / {
            set $upstream_reverb http://app:8080;
            proxy_pass $upstream_reverb;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $forwarded_port;
            
            proxy_read_timeout 86400s;
        }
    }
}
