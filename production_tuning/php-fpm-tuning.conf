; PHP-FPM High Concurrency Pool Configuration
; Save to /etc/php/8.x/fpm/pool.d/www.conf

[www]
user = www-data
group = www-data
listen = 127.0.0.1:9000

; Dynamic scaling is preferred over static to save RAM during low traffic
pm = dynamic

; High concurrency limits for 16GB+ RAM Server
pm.max_children = 1000
pm.start_servers = 100
pm.min_spare_servers = 50
pm.max_spare_servers = 150

; Prevent memory leaks by respawning workers after a set number of requests
pm.max_requests = 1000

; Timeout handling
request_terminate_timeout = 30s
request_slowlog_timeout = 10s
slowlog = /var/log/php-fpm-slow.log
